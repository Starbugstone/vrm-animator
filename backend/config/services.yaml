# config/services.yaml
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $llmCredentialEncryptionKey: '%env(LLM_CREDENTIAL_ENCRYPTION_KEY)%'
            bool $llmTestMode: '%env(bool:LLM_TEST_MODE)%'
            int $refreshTokenTtl: '%env(int:REFRESH_TOKEN_TTL)%'
            string $sharedAssetRoot: '%env(SHARED_ASSET_ROOT)%'
            string $glmBaseUrl: '%env(GLM_BASE_URL)%'

    App\Security\JwtAuthenticationSuccessHandler:
        arguments:
            $authResponseFactory: '@App\Service\AuthResponseFactory'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\State\AvatarSetOwnerProcessor:
        arguments:
            $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

    App\State\AvatarDeleteProcessor:
        arguments:
            $removeProcessor: '@api_platform.doctrine.orm.state.remove_processor'

    App\State\AnimationDeleteProcessor:
        arguments:
            $removeProcessor: '@api_platform.doctrine.orm.state.remove_processor'

    App\Service\Llm\OpenRouterProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\OpenAiProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\GeminiProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\DeepSeekProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\MiniMaxProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\GlmProvider:
        tags: ['app.llm_provider']

    App\Service\Llm\LlmProviderResolver:
        arguments:
            $providers: !tagged_iterator app.llm_provider

    App\Service\Tts\ElevenLabsClientInterface:
        alias: App\Service\Tts\ElevenLabsClient
