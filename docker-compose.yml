services:
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: vrm-php
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
    networks:
      - vrm-network

  database:
    image: mariadb:11
    container_name: vrm-database
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: vrm_animator
      MARIADB_USER: vrm_user
      MARIADB_PASSWORD: vrm_pass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vrm-network

  node:
    build:
      context: .
      dockerfile: .docker/node/Dockerfile
    container_name: vrm-node
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - vrm-network

  mailpit:
    image: axllent/mailpit
    container_name: vrm-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - vrm-network

volumes:
  db-data:
  node_modules:

networks:
  vrm-network:
    driver: bridge
